<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #1a1a1a;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    /* --- Header --- */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid #c8c6be;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .avatar svg {
      width: 20px;
      height: 20px;
      stroke: #1a1a1a;
      fill: none;
      stroke-width: 1.5;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 14px;
      color: #666;
    }

    /* --- Card --- */
    .card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 2rem;
    }

    /* --- Flash messages --- */
    .flash {
      background: #fef2f2;
      border: 0.5px solid #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #991b1b;
      margin-bottom: 1.25rem;
    }

    /* --- Form --- */
    .field {
      margin-bottom: 1.25rem;
    }

    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    label {
      font-size: 13px;
      color: #555;
    }

    .forgot {
      font-size: 12px;
      color: #888;
      text-decoration: none;
    }

    .forgot:hover { color: #1a1a1a; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 0.5px solid rgba(0,0,0,0.18);
      border-radius: 8px;
      outline: none;
      background: #fff;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: rgba(0,0,0,0.45);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .btn-primary {
      width: 100%;
      padding: 9px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #333; }

    /* --- Footer link --- */
    .footer-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 13px;
      color: #888;
    }

    .footer-link a {
      color: #1a1a1a;
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="avatar">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to your portfolio</p>
    </div>

    <div class="card">

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="/">
        {{ form.hidden_tag() if form is defined }}

        <div class="field">
          <label for="email">Email address</label>
          <input type="text" id="email" name="username" placeholder="Username" required />
        </div>

        <div class="field">
          <div class="field-header">
            <label for="password">Password</label>
          </div>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-primary">Sign in</button>
      </form>

    </div>

    <p class="footer-link">
      Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </p>

  </div>
</body>
</html>
